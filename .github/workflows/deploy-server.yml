name: Deploy Server

on:
  push:
    branches: [main]
    paths:
      - 'apps/server/**'
      - 'packages/types/**'
      - 'packages/lib/**'
      - 'Dockerfile'
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: pleno-live-api-prod
  LAMBDA_FUNCTION: pleno-live-api-prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4.3.1
        with:
          role-to-assume: arn:aws:iam::951872725222:role/pleno-live-github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419  # v2.1.5

      - name: Build and push Docker image
        id: build
        env:
          ECR_URL: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}
        run: |
          IMAGE_TAG=$(git rev-parse --short HEAD)
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          docker build -t $ECR_URL:$IMAGE_TAG .
          docker push $ECR_URL:$IMAGE_TAG

      - name: Update Lambda function
        env:
          ECR_URL: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ steps.build.outputs.IMAGE_TAG }}
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --image-uri $ECR_URL:$IMAGE_TAG \
            --no-cli-pager

      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.LAMBDA_FUNCTION }}

      - name: Verify deployment
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://live.plenoai.com/api/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "Deployment verified - health check returned 200"
