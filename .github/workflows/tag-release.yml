name: Tag Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: write

concurrency:
  group: tag-release-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  tag:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    outputs:
      eligible: ${{ steps.current-main.outputs.eligible }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Get version from package.json
        id: version
        run: |
          VERSION="$(node -p 'require("./package.json").version')"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Confirm CI commit is current main
        id: current-main
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          REMOTE_REF="$(git ls-remote --refs origin refs/heads/main)"
          REMOTE_SHA="${REMOTE_REF%%$'\t'*}"
          if [ "$REMOTE_SHA" = "$EXPECTED_SHA" ]; then
            echo "eligible=true" >> "$GITHUB_OUTPUT"
          else
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping release for stale main commit $EXPECTED_SHA"
          fi

      - name: Check release tag
        if: steps.current-main.outputs.eligible == 'true'
        id: tag
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          REMOTE_REF="$(git ls-remote --refs origin "refs/tags/$TAG")"
          REMOTE_SHA="${REMOTE_REF%%$'\t'*}"
          if [ -z "$REMOTE_SHA" ]; then
            echo "create=true" >> "$GITHUB_OUTPUT"
          elif [ "$REMOTE_SHA" = "$EXPECTED_SHA" ]; then
            echo "create=false" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Tag $TAG already points to $REMOTE_SHA instead of $EXPECTED_SHA"
            exit 1
          fi

      - name: Create release tag
        if: >-
          steps.current-main.outputs.eligible == 'true' &&
          steps.tag.outputs.create == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
        run: >-
          gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs"
          --field "ref=refs/tags/$TAG" --field "sha=$TARGET_SHA"

  release:
    needs: tag
    if: needs.tag.outputs.eligible == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.tag.outputs.tag }}
