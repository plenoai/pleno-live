name: Preview IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'app/website/**'
      - '.github/workflows/deploy-website.yml'

permissions:
  contents: write

concurrency:
  group: preview-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Load env from eas.json
        env:
          APP_HMAC_SECRET: ${{ secrets.APP_HMAC_SECRET }}
        run: |
          jq -r '.build.preview.env | to_entries[] | "\(.key)=\(.value | gsub("\n"; "") | gsub("\r"; ""))"' eas.json | envsubst >> $GITHUB_ENV

      - name: Expo prebuild
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          bundle install 2>/dev/null || true
          pod install

      - name: Setup signing
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Import certificate
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$IOS_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$IOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< \
            $(security cms -D -i $PP_PATH))
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision

          echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Build IPA
        run: |
          cd ios
          xcodebuild archive \
            -workspace PlenoLive.xcworkspace \
            -scheme PlenoLive \
            -configuration Release \
            -archivePath $RUNNER_TEMP/PlenoLive.xcarchive \
            -destination 'generic/platform=iOS' \
            -allowProvisioningUpdates \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            CODE_SIGN_STYLE=Manual \
            | xcbeautify --quiet

          # Export IPA
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/PlenoLive.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Cleanup signing
        if: always()
        run: |
          security delete-keychain $KEYCHAIN_PATH 2>/dev/null || true
          rm -f $RUNNER_TEMP/certificate.p12
          rm -f $RUNNER_TEMP/profile.mobileprovision

      - name: Get metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "tag=preview-ios-$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "ipa=pleno-live-$SHORT_SHA.ipa" >> $GITHUB_OUTPUT

      - name: Rename IPA
        run: |
          cp $RUNNER_TEMP/export/*.ipa ${{ steps.meta.outputs.ipa }}

      - name: Delete existing preview release (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete ${{ steps.meta.outputs.tag }} --yes --cleanup-tag 2>/dev/null || true

      - name: Create preview release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Preview iOS ${{ steps.meta.outputs.sha }}
          prerelease: true
          make_latest: false
          generate_release_notes: true
          body: |
            **Preview iOS build** — `${{ steps.meta.outputs.sha }}`

            ${{ github.event.head_commit.message }}

            ### Download
            **[pleno-live-${{ steps.meta.outputs.sha }}.ipa](https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/pleno-live-${{ steps.meta.outputs.sha }}.ipa)**

            > iOS 16.0以上 / Ad-hoc配布
          files: ${{ steps.meta.outputs.ipa }}

      - name: Print download URL
        run: |
          echo "✅ Download URL:"
          echo "https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/${{ steps.meta.outputs.ipa }}"

      - name: Cleanup old preview releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 1000 --json tagName,createdAt \
            --jq '[.[] | select(.tagName | test("^preview-ios-"))] | sort_by(.createdAt) | reverse | .[5:] | .[].tagName' \
            | while read -r tag; do
              [ -n "$tag" ] && gh release delete "$tag" --yes --cleanup-tag && echo "Deleted: $tag"
            done
