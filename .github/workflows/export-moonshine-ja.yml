name: Export Moonshine-tiny-ja to .pte

# 手動トリガー（初回変換・モデル更新時に実行）
on:
  workflow_dispatch:
    inputs:
      hf_repo:
        description: "アップロード先 HuggingFace リポジトリ (例: YOUR_ORG/moonshine-tiny-ja-pte)"
        required: true
        default: ""

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          # ExecuTorch (CPU-only, XNNPACK)
          pip install executorch
          # HuggingFace Transformers (Moonshine サポートは 4.52+)
          pip install "transformers>=4.52.0" torch huggingface_hub

      - name: Export Moonshine-tiny-ja to .pte
        run: python scripts/export_moonshine_ja.py --output ./pte_output

      - name: Upload .pte files to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          from huggingface_hub import HfApi
          import os

          api = HfApi(token=os.environ["HF_TOKEN"])
          repo_id = "${{ github.event.inputs.hf_repo }}"

          # リポジトリが存在しない場合は作成
          try:
              api.create_repo(repo_id=repo_id, repo_type="model", exist_ok=True)
          except Exception as e:
              print(f"repo already exists or error: {e}")

          # ファイルをアップロード
          for fname in ["moonshine_tiny_ja_xnnpack_encoder.pte",
                         "moonshine_tiny_ja_xnnpack_decoder.pte",
                         "moonshine_tiny_ja_tokenizer.json"]:
            path = f"./pte_output/{fname}"
            if os.path.exists(path):
              api.upload_file(
                path_or_fileobj=path,
                path_in_repo=fname,
                repo_id=repo_id,
                repo_type="model",
              )
              print(f"アップロード完了: {fname}")
            else:
              print(f"ファイルが見つかりません: {fname}")

          print(f"\n✅ HuggingFace にアップロード完了: https://huggingface.co/{repo_id}")
          EOF

      - name: Upload artifacts (ローカル確認用)
        uses: actions/upload-artifact@v4
        with:
          name: moonshine-tiny-ja-pte
          path: pte_output/
          retention-days: 7
