name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271  # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a  # v5.5.0
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Load env from eas.json
        run: |
          jq -r '.build.production.env | to_entries[] | "\(.key)=\(.value | gsub("\\n"; "") | gsub("\\r"; ""))"' eas.json | envsubst >> $GITHUB_ENV

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Configure Android build
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          # arm64-v8aのみ・R8 minify有効・gif/webp無効でサイズ最小化
          # configuration-cache はReact Nativeのnodeプロセス呼び出しと非互換のため無効
          # prebuild生成のgradle.propertiesは末尾改行なし。直結すると最終行のプロパティ値が壊れる
          echo >> android/gradle.properties
          cat >> android/gradle.properties << 'EOF'
          reactNativeArchitectures=arm64-v8a
          android.enableMinifyInReleaseBuilds=true
          expo.gif.enabled=false
          expo.webp.enabled=false
          EOF

      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92  # v6.2.0
        with:
          gradle-home-cache-cleanup: true

      - name: Build release APK
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g"
        run: |
          cd android
          ./gradlew assembleRelease \
            --build-cache \
            --parallel \
            -x lint \
            -x lintRelease

      - name: Get version
        id: version
        run: |
          TAG="$GITHUB_REF_NAME"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "apk=pleno-live-$VERSION.apk" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk \
             ${{ steps.version.outputs.apk }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: android-apk
          path: ${{ steps.version.outputs.apk }}

  # iOSはXcode Cloudでビルド・TestFlight配布する (ios/ci_scripts/ci_post_clone.sh参照)
  release:
    needs: [build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1

      - name: Create Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3.0.2
        with:
          name: Release ${{ needs.build-android.outputs.tag }}
          generate_release_notes: true
          make_latest: true
          files: |
            android-apk/*.apk
