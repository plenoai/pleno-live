name: Preview APK

on:
  workflow_dispatch:
  push:
    branches:
      - canary

permissions:
  contents: write

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Load env from eas.json
        env:
          APP_HMAC_SECRET: ${{ secrets.APP_HMAC_SECRET }}
        run: |
          jq -r '.build.preview.env | to_entries[] | "\(.key)=\(.value | gsub("\n"; "") | gsub("\r"; ""))"' eas.json | envsubst >> $GITHUB_ENV

      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      - name: Configure Android build
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          # arm64-v8aのみ・R8 minify有効・gif/webp無効でサイズ最小化
          # configuration-cache はReact Nativeのnodeプロセス呼び出しと非互換のため無効
          cat >> android/gradle.properties << 'EOF'
          reactNativeArchitectures=arm64-v8a
          android.enableMinifyInReleaseBuilds=true
          expo.gif.enabled=false
          expo.webp.enabled=false
          EOF

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Build release APK
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g"
        run: |
          cd android
          ./gradlew assembleRelease \
            --build-cache \
            --parallel \
            -x lint \
            -x lintRelease

      - name: Get metadata
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "tag=preview-$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "apk=pleno-live-$SHORT_SHA.apk" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk \
             ${{ steps.meta.outputs.apk }}
          cp android/app/build/outputs/apk/release/app-release.apk \
             pleno-live-latest.apk

      - name: Delete existing preview release (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete ${{ steps.meta.outputs.tag }} --yes --cleanup-tag 2>/dev/null || true

      - name: Create preview release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Preview ${{ steps.meta.outputs.sha }}
          prerelease: true
          make_latest: false
          generate_release_notes: true
          body: |
            **Preview build** — `${{ steps.meta.outputs.sha }}`

            ${{ github.event.head_commit.message }}

            ### Download
            **[pleno-live-${{ steps.meta.outputs.sha }}.apk](https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/pleno-live-${{ steps.meta.outputs.sha }}.apk)**

            > Android 5.0以上 / arm64デバイス向け
          files: |
            ${{ steps.meta.outputs.apk }}
            pleno-live-latest.apk

      - name: Print download URL
        run: |
          echo "✅ Download URL:"
          echo "https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.tag }}/${{ steps.meta.outputs.apk }}"

      - name: Cleanup old preview releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 1000 --json tagName,createdAt \
            --jq '[.[] | select(.tagName | test("^preview-"))] | sort_by(.createdAt) | reverse | .[5:] | .[].tagName' \
            | while read -r tag; do
              [ -n "$tag" ] && gh release delete "$tag" --yes --cleanup-tag && echo "Deleted: $tag"
            done
