name: Build Runner Image

on:
  workflow_dispatch:
  push:
    paths:
      - packages/infra/runner.Dockerfile

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@99214aa6889fcddfa57764031d71add364327e59  # v6.1.3
        with:
          role-to-assume: arn:aws:iam::951872725222:role/pleno-live-github-actions
          aws-region: ap-northeast-1

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419  # v2.1.5

      - name: Build and push runner image
        env:
          IMAGE: ${{ steps.ecr-login.outputs.registry }}/pleno-live-runner
        run: |
          IMAGE_TAG=$(git rev-parse --short HEAD)
          docker build \
            -f packages/infra/runner.Dockerfile \
            -t $IMAGE:$IMAGE_TAG \
            packages/infra/
          docker push $IMAGE:$IMAGE_TAG
          echo "Image pushed: $IMAGE:$IMAGE_TAG"
