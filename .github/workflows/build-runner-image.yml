name: Build Runner Image

on:
  workflow_dispatch:
  push:
    paths:
      - packages/infra/runner.Dockerfile

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b  # v6.2.0
        with:
          role-to-assume: arn:aws:iam::951872725222:role/pleno-live-github-actions
          aws-region: ap-northeast-1

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64  # v2.1.6

      - name: Build and push runner image
        env:
          IMAGE: ${{ steps.ecr-login.outputs.registry }}/pleno-live-runner
        run: |
          IMAGE_TAG=$(git rev-parse --short HEAD)
          docker build \
            -f packages/infra/runner.Dockerfile \
            -t $IMAGE:$IMAGE_TAG \
            packages/infra/
          docker push $IMAGE:$IMAGE_TAG
          echo "Image pushed: $IMAGE:$IMAGE_TAG"
