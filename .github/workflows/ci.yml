name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - canary

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Expo dependency compatibility
        run: pnpm exec expo install --check

      - name: Check iOS autolinking compatibility
        run: |
          if pnpm exec expo-modules-autolinking react-native-config --platform ios | grep -q "'react-native-svg'"; then
            echo "react-native-svg 15 is incompatible with React Native 0.85"
            exit 1
          fi

      - name: Type check
        run: pnpm check

      - name: Package Even G2 plugin
        run: pnpm even:g2:pack

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
